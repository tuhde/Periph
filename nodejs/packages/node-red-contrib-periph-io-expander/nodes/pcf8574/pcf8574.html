<script type="text/html" data-help-name="periph-pcf8574">
    <p>Controls and reads an 8-bit PCF8574 I/O expander over I²C.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
            <code>{ pin: N, value: 0|1 }</code> — set output pin N (0 drives low; 1 releases to quasi-high/input).<br>
            <code>{ pin: N }</code> — read pin N; reply sent on output.<br>
            <code>{ port: 0 }</code> — read all 8 pins; reply sent on output.
        </dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload.pin <span class="property-type">number</span></dt>
        <dd>Pin index (0–7), present when reading a single pin.</dd>
        <dt>payload.value <span class="property-type">number</span></dt>
        <dd>Logic level (0 or 1) when reading a pin; 8-bit bitmask when reading a port.</dd>
        <dt>payload.port <span class="property-type">number</span></dt>
        <dd>Port index (always 0 for PCF8574), present when reading a full port.</dd>
    </dl>

    <h3>Configuration</h3>
    <p>Set the I²C bus number (Linux <code>/dev/i2c-N</code>) and the 7-bit device address in hex
    (PCF8574: <code>20</code>–<code>27</code>; PCF8574A: <code>38</code>–<code>3F</code>; default <code>20</code>).</p>

    <h3>Notes</h3>
    <p>The PCF8574 has no push-pull high drive. Writing 1 to a pin enables the internal
    ~100 µA pull-up; writing 0 sinks up to 25 mA. LEDs must be wired active-low
    (cathode to pin, anode to VCC). The PCF8574A address range (38–3F) overlaps
    with many OLED display modules — check for conflicts.</p>
</script>
