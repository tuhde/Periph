<!-- Config node: one instance per physical device -->
<script type="text/javascript">
    RED.nodes.registerType('ens160-device', {
        category: 'config',
        defaults: {
            name: { value: '' },
            bus:  { value: '1', required: true, validate: RED.validators.number() },
            addr: { value: '0x52', required: true }
        },
        label: function() {
            return this.name || ('ENS160 @ ' + this.addr + ' (bus ' + this.bus + ')');
        }
    });
</script>

<script type="text/html" data-template-name="ens160-device">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="ENS160">
    </div>
    <div class="form-row">
        <label for="node-config-input-bus"><i class="fa fa-microchip"></i> I²C bus</label>
        <input type="number" id="node-config-input-bus" min="0" style="width:80px"> &nbsp;(Linux /dev/i2c-N)
    </div>
    <div class="form-row">
        <label for="node-config-input-addr"><i class="fa fa-microchip"></i> I²C address</label>
        <select id="node-config-input-addr" style="width:100px">
            <option value="0x52">0x52 (ADDR low)</option>
            <option value="0x53">0x53 (ADDR high)</option>
        </select>
    </div>
</script>

<!-- Read node: trigger → measurements -->
<script type="text/javascript">
    RED.nodes.registerType('periph-ens160', {
        category:  'Peripheral',
        color:     '#a6bbcf',
        defaults: {
            name:         { value: '' },
            device:       { value: '', type: 'ens160-device', required: true }
        },
        inputs:  1,
        outputs: 1,
        icon:    'font-awesome/fa-leaf',
        label:   function() { return this.name || 'ENS160'; },
        paletteLabel: 'ENS160'
    });
</script>

<script type="text/html" data-template-name="periph-ens160">
    <div class="form-row">
        <label for="node-input-device"><i class="fa fa-microchip"></i> Device</label>
        <input type="text" id="node-input-device">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="ENS160">
    </div>
</script>

<script type="text/html" data-help-name="periph-ens160">
    <p>Reads air quality (AQI, TVOC, eCO2) from an ENS160 digital multi-gas sensor.</p>
    <p>Any input message triggers a measurement. The device is configured via an <b>ens160-device</b> config node.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">any</span></dt>
        <dd>Any incoming message triggers a measurement.</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload.aqi <span class="property-type">number</span></dt>
        <dd>Air Quality Index (UBA scale, 1–5).</dd>
        <dt>payload.tvocPpb <span class="property-type">number</span></dt>
        <dd>TVOC concentration in ppb.</dd>
        <dt>payload.eco2Ppm <span class="property-type">number</span></dt>
        <dd>Equivalent CO2 concentration in ppm.</dd>
        <dt>payload.status <span class="property-type">number</span></dt>
        <dd>VALIDITY_FLAG (0=OK, 1=Warm-up, 2=Initial Start-up, 3=Invalid).</dd>
    </dl>

    <h3>Configuration</h3>
    <p>Set the I²C bus number and I²C address (<code>0x52</code> or <code>0x53</code>)
    in the device config node. The sensor requires ~3 minutes warm-up after power-on
    before VALIDITY_FLAG reaches 0.</p>
</script>
