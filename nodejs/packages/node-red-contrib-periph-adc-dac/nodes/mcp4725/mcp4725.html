<script type="text/javascript">
    RED.nodes.registerType('periph-mcp4725-device', {
        category: 'config',
        defaults: {
            name:    { value: '' },
            bus:     { value: '1', required: true, validate: RED.validators.number() },
            address: { value: '60', required: true }
        },
        label: function() {
            return this.name || ('MCP4725 @ 0x' + this.address + ' (bus ' + this.bus + ')');
        }
    });
</script>

<script type="text/html" data-template-name="periph-mcp4725-device">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="MCP4725">
    </div>
    <div class="form-row">
        <label for="node-config-input-bus"><i class="fa fa-microchip"></i> I²C bus</label>
        <input type="number" id="node-config-input-bus" min="0" style="width:80px"> &nbsp;(Linux /dev/i2c-N)
    </div>
    <div class="form-row">
        <label for="node-config-input-address">Address (hex)</label>
        <input type="text" id="node-config-input-address" placeholder="60" style="width:80px"> &nbsp;default: 60 (0x60)
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('periph-mcp4725', {
        category:  'Peripheral',
        color:     '#a6bbcf',
        defaults: {
            name:    { value: '' },
            device:  { value: '', type: 'periph-mcp4725-device', required: true },
            mode:    { value: 'fraction' },
            persist: { value: false }
        },
        inputs:  1,
        outputs: 0,
        icon:    'font-awesome/fa-volume-up',
        label:   function() { return this.name || 'MCP4725'; },
        paletteLabel: 'MCP4725'
    });
</script>

<script type="text/html" data-template-name="periph-mcp4725">
    <div class="form-row">
        <label for="node-input-device"><i class="fa fa-microchip"></i> Device</label>
        <input type="text" id="node-input-device">
    </div>
    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-cog"></i> Input mode</label>
        <select id="node-input-mode" style="width:120px">
            <option value="fraction">Fraction (0.0–1.0)</option>
            <option value="raw">Raw (0–4095)</option>
        </select>
    </div>
    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-persist" style="width:auto">
        <label for="node-input-persist">Persist to EEPROM</label>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="MCP4725">
    </div>
</script>

<script type="text/html" data-help-name="periph-mcp4725">
    <p>Writes a voltage to the MCP4725 12-bit DAC over I²C.</p>
    <p>Send a number in <code>msg.payload</code> to set the DAC output:</p>
    <ul>
        <li><b>Fraction mode (default):</b> value between 0.0 and 1.0</li>
        <li><b>Raw mode:</b> integer between 0 and 4095</li>
    </ul>
    <p>Enable <b>Persist to EEPROM</b> to save the value across power cycles.</p>
    <p>The device is configured via a <b>periph-mcp4725-device</b> config node.</p>
</script>
