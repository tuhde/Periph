name: New Transport
description: Request a new transport implementation
title: "transport: <TransportName>"
labels: ["transport", "needs-spec"]
body:
  - type: input
    id: transport_name
    attributes:
      label: Transport name
      placeholder: e.g. SPI, I²C, UART, CAN
    validations:
      required: true

  - type: checkboxes
    id: platforms
    attributes:
      label: Target platforms
      options:
        - label: "Python — MicroPython"
          required: false
          checked: true
        - label: "Python — CircuitPython"
          required: false
          checked: true
        - label: "Python — Linux (smbus2 / spidev)"
          required: false
          checked: true
        - label: "C++ — Arduino"
          required: false
          checked: true
        - label: "C++ — Zephyr RTOS"
          required: false
          checked: true
        - label: "C++ — Linux (GCC)"
          required: false
          checked: true
        - label: "Node.js — Linux"
          required: false
          checked: true
        - label: "Rust — embedded-hal (bare-metal / ESP32-S3)"
          required: false
          checked: true
        - label: "Rust — Linux (spidev / i2c-dev)"
          required: false
          checked: true
        - label: Other (describe in notes)

  - type: input
    id: reference_url
    attributes:
      label: Protocol reference URL
      description: Link to the protocol specification, standard, or application note. Leave blank if attaching a PDF below.

  - type: textarea
    id: reference_attach
    attributes:
      label: Protocol reference attachment
      description: |
        Attach a specification PDF by dragging it here or clicking the attachment icon.
        Providing either a URL above or an attachment here is strongly recommended.

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Specific hardware constraints, known quirks, or anything else relevant.
