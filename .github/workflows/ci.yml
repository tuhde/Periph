name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Arduino — compile-only (no hardware required)
  # -----------------------------------------------------------------------
  arduino:
    name: Arduino compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Arduino board packages
        uses: actions/cache@v5
        with:
          path: ~/.arduino15
          key: arduino15-esp32-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: arduino15-esp32-

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Compile test sketches
        run: cpp/test_arduino.sh --compile-only power/ina226

  # -----------------------------------------------------------------------
  # Linux GCC — compile-only (no hardware required)
  # -----------------------------------------------------------------------
  linux-gcc:
    name: Linux GCC compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compile test programs
        run: cpp/test_linux.sh --compile-only power/ina226

  # -----------------------------------------------------------------------
  # Python — syntax check across all chip drivers and tests
  # -----------------------------------------------------------------------
  python:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check syntax
        run: |
          find python/periph python/tests python/examples -name '*.py' \
            | xargs python3 -m py_compile

  # -----------------------------------------------------------------------
  # Node.js — install deps, check syntax, verify chip driver loads
  # -----------------------------------------------------------------------
  nodejs:
    name: Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: nodejs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nodejs

      - name: Syntax check
        run: |
          find nodejs/packages/periph/src nodejs/tests -name '*.js' \
            | xargs -I{} node --check {}

      - name: Verify chip drivers load
        run: |
          node -e "const m = require('./nodejs/packages/periph/src/chips/power/ina226'); \
                   if (!m.INA226Minimal || !m.INA226Full) process.exit(1)"

      - name: Check periph / Node-RED package READMEs are up to date
        run: node nodejs/scripts/generate-readmes.js --check

  # -----------------------------------------------------------------------
  # Java / Kotlin / Groovy — compile-only (no hardware required)
  # -----------------------------------------------------------------------
  java:
    name: Java compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compile JVM modules
        run: mvn install --batch-mode --no-transfer-progress -DskipTests
        working-directory: jvm

  # -----------------------------------------------------------------------
  # Rust — compile-only (no hardware required)
  # -----------------------------------------------------------------------
  rust:
    name: Rust compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get install -y libudev-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-

      - name: Compile workspace
        run: cargo build --manifest-path rust/Cargo.toml
