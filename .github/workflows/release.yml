name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Extract version number from the tag (v1.2.3 → 1.2.3)
  # -----------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

  # -----------------------------------------------------------------------
  # Python — build wheel + sdist, attach to GitHub release
  # -----------------------------------------------------------------------
  python-build:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Stamp version
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.meta.outputs.version }}"/' \
            python/pyproject.toml

      - name: Build
        run: |
          pip install --quiet build
          python -m build python/
          VERSION="${{ needs.meta.outputs.version }}"
          mv python/dist/periph-${VERSION}.tar.gz \
             python/dist/periph-python-${VERSION}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/

  # -----------------------------------------------------------------------
  # Arduino — zip cpp/ per Library Manager spec, attach to GitHub release
  # -----------------------------------------------------------------------
  arduino-build:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stamp version
        run: |
          sed -i 's/^version=.*/version=${{ needs.meta.outputs.version }}/' \
            cpp/library.properties

      - name: Package
        run: |
          mkdir -p arduino-pkg/Periph
          cp -r cpp/src cpp/examples cpp/library.properties arduino-pkg/Periph/
          cd arduino-pkg
          zip -r ../Periph-cpp-${{ needs.meta.outputs.version }}.zip Periph/

      - uses: actions/upload-artifact@v4
        with:
          name: arduino-dist
          path: Periph-cpp-*.zip

  # -----------------------------------------------------------------------
  # Node.js — publish all workspace packages to npm
  # periph core is published first; contrib packages follow
  # -----------------------------------------------------------------------
  nodejs-publish:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Stamp version
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          for f in nodejs/packages/*/package.json; do
            jq --arg v "$VERSION" '.version = $v' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Generate READMEs for placeholder packages
        shell: python3 {0}
        run: |
          import json, pathlib
          for d in sorted(pathlib.Path('nodejs/packages').glob('node-red-contrib-periph-*/')):
              if (d / 'README.md').exists():
                  continue
              pkg = json.loads((d / 'package.json').read_text())
              name, desc = pkg['name'], pkg['description']
              (d / 'README.md').write_text(
                  f'# {name}\n\n'
                  f'{desc} — part of the [Periph](https://github.com/tuhde/Periph) library.\n\n'
                  f'> **Coming soon.** Nodes will be added as chips in this category'
                  f' are implemented.\n\n'
                  f'## Install\n\n'
                  f'```sh\nnpm install {name}\n```\n\n'
                  f'## Links\n\n'
                  f'- [GitHub](https://github.com/tuhde/Periph)\n'
                  f'- [All supported chips](https://github.com/tuhde/Periph#supported-chips)\n'
              )

      - name: Publish periph core
        working-directory: nodejs
        run: npm publish --workspace periph --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Node-RED contrib packages
        working-directory: nodejs
        run: |
          for d in packages/node-red-contrib-periph-*/; do
            name=$(jq -r '.name' "$d/package.json")
            npm publish --workspace "$name" --access public || \
              echo "WARNING: $name publish failed or is already at this version"
            sleep 10
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # -----------------------------------------------------------------------
  # Rust — publish periph crate to crates.io
  # -----------------------------------------------------------------------
  rust-publish:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get install -y libudev-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-release-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-release-

      - name: Stamp version
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.meta.outputs.version }}"/' \
            rust/periph/Cargo.toml

      - name: Publish
        run: cargo publish --manifest-path rust/periph/Cargo.toml --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # -----------------------------------------------------------------------
  # JVM — build JARs, attach to GitHub release
  # -----------------------------------------------------------------------
  jvm-build:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Stamp version
        run: |
          mvn versions:set -DnewVersion=${{ needs.meta.outputs.version }} \
            -DgenerateBackupPoms=false \
            --batch-mode --no-transfer-progress
        working-directory: jvm

      - name: Build
        run: mvn package --batch-mode --no-transfer-progress -DskipTests
        working-directory: jvm

      - name: Collect JARs
        run: |
          mkdir jvm-jars
          find jvm -name '*.jar' -path '*/target/*' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' \
            | xargs cp -t jvm-jars/

      - uses: actions/upload-artifact@v4
        with:
          name: jvm-dist
          path: jvm-jars/

  # -----------------------------------------------------------------------
  # Arduino branch — sync cpp/ into the arduino orphan branch, tag it
  # The arduino branch has library.properties at root (required by LM).
  # Tagged arduino-vX.Y.Z so the Arduino Library Manager can track it.
  # -----------------------------------------------------------------------
  arduino-branch:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up arduino branch
        run: |
          git fetch origin arduino
          git worktree add /tmp/arduino-worktree arduino

      - name: Sync cpp/ into arduino branch
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          AW=/tmp/arduino-worktree

          # Clear existing content (keep .git)
          find "$AW" -mindepth 1 -not -path "$AW/.git" -not -path "$AW/.git/*" -delete

          # Copy src/ and examples/ (Arduino only, no Zephyr)
          cp -r cpp/src "$AW/src"
          mkdir -p "$AW/examples"
          for d in cpp/examples/*/; do
            name=$(basename "$d")
            [[ "$name" == *_Zephyr ]] && continue
            cp -r "$d" "$AW/examples/$name"
          done

          # Stamp version in library.properties
          sed "s/^version=.*/version=${VERSION}/" cpp/library.properties > "$AW/library.properties"

      - name: Commit and tag arduino branch
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          TAG="arduino-v${VERSION}"
          AW=/tmp/arduino-worktree

          cd "$AW"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: release ${TAG}"
          fi
          git tag "$TAG"
          git push origin arduino
          git push origin "$TAG"

  # -----------------------------------------------------------------------
  # INSTALL.md — stamp version and commit back to main
  # -----------------------------------------------------------------------
  update-install-md:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Stamp version
        run: |
          OLD=$(grep -oP '(?<=<!-- periph-version: )[^ >]+(?= -->)' INSTALL.md)
          NEW="${{ needs.meta.outputs.version }}"
          sed -i "s/${OLD//./\\.}/${NEW}/g" INSTALL.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add INSTALL.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: update INSTALL.md to v${{ needs.meta.outputs.version }} [skip ci]"
            git push origin main
          fi

  # -----------------------------------------------------------------------
  # Release — create GitHub release and attach all file artifacts
  # nodejs-publish and rust-publish are listed as dependencies so the
  # release is only created when all platforms have succeeded
  # -----------------------------------------------------------------------
  release:
    needs: [python-build, arduino-build, arduino-branch, nodejs-publish, rust-publish, jvm-build, update-install-md]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
