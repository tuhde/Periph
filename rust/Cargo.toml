[workspace]
resolver = "2"
exclude = [
    "tests/power/ina226_test_esp32s3",
    "tests/power/ina219_test_esp32s3",
    "tests/power/ina3221_test_esp32s3",
    "tests/pressure/bmp180_test_esp32s3",
    "tests/adc_dac/mcp4725_test_esp32s3",
    "tests/transport/smbus_test_esp32s3",
    "tests/transport/spi_test_esp32s3",
]
members = [
    "periph",
    "examples/ina226_minimal",
    "examples/ina226_complete",
    "examples/ina226_demo",
    "tests/power/ina226_test",
    "examples/ina219_minimal",
    "examples/ina219_complete",
    "examples/ina219_demo",
    "tests/power/ina219_test",
    "examples/ina3221_minimal",
    "examples/ina3221_complete",
    "examples/ina3221_demo",
    "tests/power/ina3221_test",
    "examples/bmp180_minimal",
    "examples/bmp180_complete",
    "examples/bmp180_demo",
    "tests/pressure/bmp180_test",
    "examples/mcp4725_minimal",
    "examples/mcp4725_complete",
    "examples/mcp4725_demo",
    "tests/adc_dac/mcp4725_test",
    "tests/transport/smbus_test",
    "tests/transport/spi_test",
]

[workspace.dependencies]
embedded-hal = "1.0"
linux-embedded-hal = "0.4"
embedded-hal-bus = "0.2"
spidev = "0.5"
periph = { path = "periph" }